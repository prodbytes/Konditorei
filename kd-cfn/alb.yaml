AWSTemplateFormatVersion: '2010-09-09'
Description: kd-web — ALB tier (security group, application load balancer, target group, listener)

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  Subnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets for the internet-facing ALB
  ContainerPort:
    Type: Number
    Default: 3000

Resources:
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${AWS::StackName} ALB security group'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from anywhere
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-alb-sg'

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Type: application
      Scheme: internet-facing
      Subnets: !Ref Subnets
      SecurityGroups:
        - !Ref AlbSecurityGroup
      LoadBalancerAttributes:
        # Keep SSE (EventSource) connections alive longer than the 60s default.
        - Key: idle_timeout.timeout_seconds
          Value: '3600'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-alb'

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VpcId
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        # "/" issues a 307 redirect to a new match, so accept 2xx-3xx.
        HttpCode: 200-399
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '20'

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

Outputs:
  TargetGroupArn:
    Description: ARN of the target group the ECS service registers into
    Value: !Ref TargetGroup
  AlbSecurityGroupId:
    Description: ALB security group id (source for the task ingress rule)
    Value: !Ref AlbSecurityGroup
  LoadBalancerUrl:
    Description: Public URL of the load balancer
    Value: !Sub 'http://${LoadBalancer.DNSName}'
